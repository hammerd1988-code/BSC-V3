name: Mobile App — Build

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install deps + build web assets
        run: |
          npm ci
          npm run build

      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: bsc-android-debug
          path: android/app/build/outputs/apk/debug/*.apk

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps + build web assets
        run: |
          npm ci
          npm run build

      # The iOS native project is generated on demand (macOS-only via CocoaPods)
      # rather than committed, since it requires a Mac to build anyway.
      - name: Generate + sync iOS project
        run: |
          npx cap add ios
          npx cap sync ios

      # Unsigned simulator build to verify the project compiles. A signed,
      # distributable .ipa additionally requires Apple Developer credentials
      # (certificate + provisioning profile) supplied via secrets.
      - name: Build (simulator, unsigned)
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcodeworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
