name: Casper CLI — Build Binaries

on:
  push:
    tags:
      - 'casper-cli-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: node20-linux-x64
            artifact: casper-linux-x64
            smoke: true
          - os: ubuntu-latest
            target: node20-linux-arm64
            artifact: casper-linux-arm64
            smoke: false
          - os: macos-latest
            target: node20-macos-x64
            artifact: casper-macos-x64
            smoke: false
          - os: macos-latest
            target: node20-macos-arm64
            artifact: casper-macos-arm64
            smoke: true
          - os: windows-latest
            target: node20-win-x64
            artifact: casper-win-x64.exe
            smoke: true
          - os: windows-latest
            target: node20-win-arm64
            artifact: casper-win-arm64.exe
            smoke: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/casper-cli
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - run: npm ci
      # Full type-check before we spend time bundling/packaging.
      - name: Type-check
        run: npm run lint
      - name: Test OpenRouter and OpenAI provider resolution
        run: npm run build && npm run test:providers
      - run: npm run bundle
      - name: Package binary
        shell: bash
        # Output to a per-platform filename so each release asset is distinct.
        # (A shared "casper"/"casper.exe" name made every build collide into one asset.)
        run: node node_modules/@yao-pkg/pkg/lib-es5/bin.js bundle/casper.cjs --targets ${{ matrix.target }} --output "bin/dist/${{ matrix.artifact }}"
      - name: Smoke test binary
        if: ${{ matrix.smoke }}
        shell: bash
        # The binary's arch matches the runner, so we can actually execute it.
        # Verify it starts and reports the expected version, and that a
        # non-interactive command exits cleanly without a configured LLM.
        run: |
          set -euo pipefail
          BIN="bin/dist/${{ matrix.artifact }}"
          chmod +x "$BIN" || true
          EXPECTED="$(node -p "require('./package.json').version")"
          GOT="$("$BIN" --version)"
          echo "casper --version => $GOT (expected $EXPECTED)"
          test "$GOT" = "$EXPECTED"
          "$BIN" config get model
      - name: Checksum
        shell: bash
        run: |
          set -euo pipefail
          cd bin/dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi
          cat "${{ matrix.artifact }}.sha256"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            packages/casper-cli/bin/dist/${{ matrix.artifact }}
            packages/casper-cli/bin/dist/${{ matrix.artifact }}.sha256

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write        # required for build provenance attestation
      attestations: write    # required for build provenance attestation
    defaults:
      run:
        working-directory: packages/casper-cli
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0   # need tags + history for Casper-specific release notes
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          EXPECTED="casper-cli-v${VERSION}"
          echo "Tag: ${GITHUB_REF_NAME} | package.json: ${VERSION} | expected: ${EXPECTED}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED}" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match package.json version (expected '${EXPECTED}'). Bump packages/casper-cli/package.json or retag."
            exit 1
          fi
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: packages/casper-cli/artifacts
      - name: Assemble release directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          # download-artifact nests each upload under artifacts/<name>/...
          find artifacts -type f \( -name 'casper-*' \) ! -name '*.sha256' -exec cp {} release/ \;
          ls -la release
      - name: Generate checksums + manifest
        run: node scripts/gen-manifest.mjs release --tag "${GITHUB_REF_NAME}"
      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: 'packages/casper-cli/release/casper-*'
      - name: Casper-specific release notes
        shell: bash
        run: node scripts/gen-release-notes.mjs "${GITHUB_REF_NAME}" > release/RELEASE_NOTES.md || echo "" > release/RELEASE_NOTES.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: packages/casper-cli/release/RELEASE_NOTES.md
          files: |
            packages/casper-cli/release/casper-*
            packages/casper-cli/release/SHA256SUMS
            packages/casper-cli/release/manifest.json
            packages/casper-cli/scripts/install.sh
            packages/casper-cli/scripts/install.ps1
