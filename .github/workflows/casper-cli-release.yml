name: Casper CLI — Build Binaries

on:
  push:
    tags:
      - 'casper-cli-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node20-linux-x64
            artifact: casper-linux-x64
          - os: macos-latest
            target: node20-macos-x64
            artifact: casper-macos-x64
          - os: macos-latest
            target: node20-macos-arm64
            artifact: casper-macos-arm64
          - os: windows-latest
            target: node20-win-x64
            artifact: casper-win-x64.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/casper-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run bundle
      - name: Package binary
        run: |
          node node_modules/@yao-pkg/pkg/lib-es5/bin.js bundle/casper.cjs \
            --targets ${{ matrix.target }} \
            --output bin/dist/casper \
            --no-bytecode
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/casper-cli/bin/dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
