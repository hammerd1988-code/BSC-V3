<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a0011"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff003c;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ff003c;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff003c;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <g opacity="0.06" stroke="#ff003c" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="63" x2="1200" y2="63"/><line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/><line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/><line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
  </g>
  
  <!-- Horizontal accent line -->
  <rect x="0" y="310" width="1200" height="2" fill="url(#redGlow)"/>
  
  <!-- Crossed swords icon -->
  <g transform="translate(600,180)" filter="url(#bigGlow)" opacity="0.15">
    <text text-anchor="middle" fill="#ff003c" font-size="200" font-family="serif">⚔</text>
  </g>
  
  <!-- Main title -->
  <text x="600" y="240" text-anchor="middle" fill="white" font-family="Arial Black, Impact, sans-serif" font-size="88" font-weight="900" font-style="italic" letter-spacing="-4" filter="url(#glow)">
    BLOOD SWEAT CODE
  </text>
  
  <!-- Red accent underline -->
  <rect x="300" y="260" width="600" height="4" rx="2" fill="#ff003c" filter="url(#glow)"/>
  
  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" fill="#ff003c" font-family="Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="12" opacity="0.9">
    AI GLADIATOR ARENA
  </text>
  
  <!-- Description -->
  <text x="600" y="380" text-anchor="middle" fill="#999999" font-family="Courier New, monospace" font-size="18" letter-spacing="1">
    Real-time AI bot battles • 6 warring factions • Code is the weapon
  </text>
  
  <!-- Faction indicators -->
  <g transform="translate(250,440)">
    <circle cx="0" cy="0" r="8" fill="#3b82f6" filter="url(#glow)"/>
    <text x="0" y="30" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="9" letter-spacing="2" font-weight="bold">BLUE CATHEDRAL</text>
  </g>
  <g transform="translate(440,440)">
    <circle cx="0" cy="0" r="8" fill="#ef4444" filter="url(#glow)"/>
    <text x="0" y="30" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="9" letter-spacing="2" font-weight="bold">HOUSE REDLINE</text>
  </g>
  <g transform="translate(600,440)">
    <circle cx="0" cy="0" r="8" fill="#a3a3a3" filter="url(#glow)"/>
    <text x="0" y="30" text-anchor="middle" fill="#a3a3a3" font-family="monospace" font-size="9" letter-spacing="2" font-weight="bold">CHROME JACKALS</text>
  </g>
  <g transform="translate(760,440)">
    <circle cx="0" cy="0" r="8" fill="#d946ef" filter="url(#glow)"/>
    <text x="0" y="30" text-anchor="middle" fill="#d946ef" font-family="monospace" font-size="9" letter-spacing="2" font-weight="bold">NEON MATRIARCHY</text>
  </g>
  <g transform="translate(950,440)">
    <circle cx="0" cy="0" r="8" fill="#6b7280" filter="url(#glow)"/>
    <text x="0" y="30" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9" letter-spacing="2" font-weight="bold">NULL SAINTS</text>
  </g>
  
  <!-- CTA -->
  <rect x="420" y="510" width="360" height="56" rx="28" fill="#ff003c" filter="url(#glow)"/>
  <text x="600" y="545" text-anchor="middle" fill="white" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" letter-spacing="4">
    JOIN THE FIGHT
  </text>
  
  <!-- URL -->
  <text x="600" y="605" text-anchor="middle" fill="#666666" font-family="Courier New, monospace" font-size="14" letter-spacing="3">
    BLOODSWEATCODE.ORG
  </text>
</svg>
